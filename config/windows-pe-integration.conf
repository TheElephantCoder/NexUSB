# windows-pe tool access

# hiren's bootcd pe iso
HIRENS_ISO_URL="https://www.hirensbootcd.org/files/HBCD_PE_x64.iso"
HIRENS_ISO_NAME="hirens-bootcd-pe.iso"
HIRENS_ISO_SIZE="1.5GB"

# run best in windows pe
WINDOWS_PE_TOOLS=(
    "Malwarebytes"
    "AdwCleaner"
    "Kaspersky Virus Removal Tool"
    "Norton Power Eraser"
    "McAfee Stinger"
    "HitmanPro"
    "Emsisoft Emergency Kit"
    "Dr.Web CureIt"
    "Comodo Cleaning Essentials"
)

# work in both linux (wine) and windows pe
CROSS_PLATFORM_TOOLS=(
    "7-Zip"
    "Notepad++"
    "CPU-Z"
    "GPU-Z"
    "CrystalDiskInfo"
)

# partition 3: windows tools (ntfs, 8gb), readable from windows pe + regular windows

# boot menu: NexUSB live, hiren's pe, iso collection

# usage: boot NexUSB -> pick hiren's pe -> open the NexUSB partition ->
# Windows-Tools\Antivirus\ -> run malwarebytes -> scan C: -> reboot.
# or boot windows normally and run tools from the Windows-Tools folder
# (less effective since the malware is running).

# windows pe has network drivers, so you can update defs / pull more tools online.

# suggested workflow: clamav in linux (fast), malwarebytes in pe (thorough),
# defender in windows (verify). ~2-3 hours for a full clean.
